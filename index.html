<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5C4A3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Daily Score</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="date-nav">
      <button id="prev-day" aria-label="Previous day">&#8249;</button>
      <span class="date-label" id="date-label">
        <span id="date-text"></span>
        <input type="date" id="date-picker" aria-label="Pick a date">
      </span>
      <button id="next-day" aria-label="Next day">&#8250;</button>
    </div>
    <nav class="tab-nav">
      <button class="active" data-view="score">Score</button>
      <button data-view="history">History</button>
      <button class="settings-btn" data-view="settings" aria-label="Settings">&#9881;</button>
    </nav>
  </header>

  <main class="main">
    <!-- Score View -->
    <div id="view-score" class="view active"></div>

    <!-- History View -->
    <div id="view-history" class="view"></div>

    <!-- Settings View -->
    <div id="view-settings" class="view"></div>
  </main>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>

</body>
</html>
